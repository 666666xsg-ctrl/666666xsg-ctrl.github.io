    <header class="site-chrome" aria-label="Primary">
      <a class="logo-wrap" href="#/" aria-label="刘灿旭 home">

          <span></span><span></span><span></span><span></span>
        </span>
        <span class="logo-tag">pacome</span>

      <div class="mode-switch" aria-label="View mode">
        <button class="mode-button is-active" type="button" data-mode="spiral">
          <span>spiral</span><span>spiral</span>
        </button>
        <i></i>
        <button class="mode-button" type="button" data-mode="list">
          <span>list</span><span>list</span>
        </button>
      </div>

      <div class="menu-shell">
        <button class="menu-button" type="button" aria-expanded="false">
          <span>menu</span>
        </button>
        <button class="menu-close" type="button" aria-label="close menu">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </button>
      </div>
    </header>

    <aside class="menu-panel" aria-hidden="true">
      <nav class="menu-links" aria-label="Menu">
        <a href="#/" data-route="works">works</a>
        <a href="#/about" data-route="about">about</a>

          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4.5 6.5h15v11h-15z"></path>
            <path d="m5 7 7 6 7-6"></path>
            <path d="m5 17 5.1-5"></path>
            <path d="m19 17-5.1-5"></path>
          </svg>
        </button>
        <span class="menu-email-text" id="menu-email" aria-hidden="true">liucanxv@163.com</span>
      </footer>

    <button class="menu-backdrop" type="button" aria-label="close menu"></button>

    <main id="app" tabindex="-1"></main>

    <button class="sound-button" type="button" aria-label="toggle sound">
      <svg viewBox="0 0 14 12" aria-hidden="true">
        <path class="sound-wave" d="M8.7 3.3c.4.3.7.7 1 1.2.2.5.3 1 .3 1.5s-.1 1-.3 1.5c-.3.5-.6.9-1 1.2"></path>

    <button class="blessing-trigger" type="button" aria-label="打开祝福">
      <span class="blessing-trigger__surface">
        <span class="blessing-trigger__glow"></span>
        <span class="blessing-trigger__mark">愿</span>
      </span>
      <svg class="blessing-trigger__ring" viewBox="0 0 132 132" aria-hidden="true">
        <path id="blessingPath" d="M66 66m-52 0a52 52 0 1 1 104 0a52 52 0 1 1 -104 0"></path>
        <text><textPath href="#blessingPath">blessing &#8226; for you &#8226; blessing &#8226; for you &#8226;</textPath></text>
      </svg>

    <section class="loader" aria-label="Intro" role="button" tabindex="0">
      <div class="intro-stage">
        <div class="intro-signature" data-text="刘灿旭" aria-label="刘灿旭">
          <svg class="signature-draw" viewBox="0 0 900 260" aria-hidden="true">
            <text class="signature-char signature-char--1" x="185" y="178">刘</text>
            <text class="signature-char signature-char--2" x="450" y="178">灿</text>
            <text class="signature-char signature-char--3" x="715" y="178">旭</text>
          </svg>
          <div class="signature-fill" aria-hidden="true"><span>刘</span><span>灿</span><span>旭</span></div>
          <div class="signature-zoom" aria-hidden="true"><span>刘</span><span>灿</span><span>旭</span></div>
        </div>
        <span class="intro-enter-cue" aria-hidden="true"></span>
      </div>
    </section>

    <dialog class="blessing-dialog" aria-label="祝福">
      <button class="dialog-close blessing-close" type="button" aria-label="关闭祝福">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>
      </button>
      <article class="blessing-panel">
        <span class="blessing-panel__eyebrow">FOR YOU</span>
        <p>愿你一路有光，心有热爱，眼有星河；每一次出发，都遇见更辽阔的自己。</p>
        <i aria-hidden="true"></i>
      </article>
    </dialog>

    <script src="script.js?v=fast-fx-30"></script>
